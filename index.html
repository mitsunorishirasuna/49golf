<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>４９ゴルフ会</title>
<style>
:root {
  --gd: #1a5c1a; --gm: #2d7a2d; --gl: #4caf50; --gp: #e8f5e9;
  --gold: #c8960c; --white: #fff; --gray: #9e9e9e; --danger: #c62828;
  --text: #1a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:var(--gp);color:var(--text);min-height:100vh;max-width:500px;margin:0 auto;position:relative;}
.hdr{background:linear-gradient(135deg,var(--gd),var(--gm));color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-title{font-size:18px;font-weight:bold;letter-spacing:2px;}
.hdr-nav{display:flex;gap:8px;margin-top:6px;}
.nav-btn{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:4px 12px;border-radius:16px;font-size:13px;cursor:pointer;}
.page{display:none;padding:16px;padding-bottom:90px;min-height:100vh;}
.page.active{display:block;}

/* HOME */
.home-wrap{text-align:center;padding:28px 16px 20px;}
.home-icon{font-size:52px;line-height:1;}
.home-title{font-size:26px;font-weight:bold;color:var(--gd);letter-spacing:4px;margin-top:6px;}
.home-sub{color:var(--gm);font-size:13px;margin-top:2px;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 8px;}
.menu-btn{background:linear-gradient(135deg,var(--gm),var(--gd));color:#fff;border:none;border-radius:14px;padding:22px 12px;font-size:14px;font-weight:bold;cursor:pointer;text-align:center;box-shadow:0 4px 12px rgba(45,122,45,.4);line-height:1.5;transition:transform .1s;}
.menu-btn:active{transform:scale(.96);}
.menu-btn .ico{font-size:28px;display:block;margin-bottom:6px;}
.admin-fab{position:fixed;bottom:22px;right:18px;background:#555;color:#fff;border:none;border-radius:50%;width:50px;height:50px;font-size:22px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;}

/* CARDS */
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.card-title{font-size:15px;font-weight:bold;color:var(--gd);margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--gl);display:flex;align-items:center;gap:5px;}
.sec-title{font-size:15px;font-weight:bold;color:var(--gd);margin:14px 0 8px;display:flex;align-items:center;gap:5px;}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--gd);color:#fff;padding:7px 4px;text-align:center;white-space:nowrap;}
.tbl td{padding:7px 4px;text-align:center;border-bottom:1px solid #eee;white-space:nowrap;}
.tbl tr:nth-child(even) td{background:#f9fdf9;}
.tbl .r1 td{background:rgba(200,150,12,.08);font-weight:bold;}
.tbl .r2 td{background:rgba(176,176,176,.1);}
.scroll-x{overflow-x:auto;}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:bold;}
.bg{background:var(--gold);color:#fff;}
.bs{background:#9e9e9e;color:#fff;}
.bv{background:var(--gm);color:#fff;}

/* YEAR BUTTONS */
.yr-grp{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.yr-btn{background:var(--gm);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;font-weight:bold;}
.yr-btn:active{background:var(--gd);}

/* CHAMPION CARD */
.champ-card{background:linear-gradient(135deg,#fdf8e8,#fef9ed);border:2px solid var(--gold);border-radius:12px;padding:14px;margin-bottom:12px;}
.champ-yr{font-size:17px;font-weight:bold;color:var(--gd);border-bottom:1px solid var(--gold);padding-bottom:7px;margin-bottom:10px;}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:12px;color:#666;margin-bottom:3px;font-weight:bold;}
.fi{width:100%;padding:9px 12px;border:2px solid #ddd;border-radius:8px;font-size:15px;}
.fi:focus{border-color:var(--gm);outline:none;}
.fs{width:100%;padding:9px 12px;border:2px solid #ddd;border-radius:8px;font-size:15px;background:#fff;}

/* BUTTONS */
.btn{padding:12px 20px;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;margin-bottom:8px;}
.btn-p{background:var(--gm);color:#fff;}
.btn-s{background:#666;color:#fff;}
.btn-d{background:var(--danger);color:#fff;}
.btn:disabled{background:var(--gray);cursor:not-allowed;opacity:.6;}

/* PLAYER INPUT ROW */
.prow{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);}
.prow-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pname{font-weight:bold;font-size:16px;color:var(--gd);}
.sinputs{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;text-align:center;}
.sinputs label{font-size:11px;color:#666;display:block;margin-bottom:2px;}
.sinputs input[type=number]{width:100%;padding:7px 2px;border:2px solid #ddd;border-radius:6px;font-size:15px;text-align:center;-moz-appearance:textfield;}
.sinputs input[type=number]::-webkit-outer-spin-button,
.sinputs input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.sinputs input:focus{border-color:var(--gm);outline:none;}
.auto-f{background:var(--gp);padding:7px 2px;border-radius:6px;font-size:14px;font-weight:bold;color:var(--gd);min-height:34px;display:flex;align-items:center;justify-content:center;}
.dis-f{background:#eee;color:#bbb;padding:7px 2px;border-radius:6px;font-size:12px;min-height:34px;display:flex;align-items:center;justify-content:center;}
.net-wait{font-size:10px;color:#999;background:#f5f5f5;padding:4px 2px;border-radius:6px;min-height:34px;display:flex;align-items:center;justify-content:center;line-height:1.2;}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;justify-content:center;align-items:center;}
.mo.active{display:flex;}
.mbox{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:380px;max-height:85vh;overflow-y:auto;}
.mtitle{font-size:18px;font-weight:bold;color:var(--gd);margin-bottom:14px;text-align:center;}

/* PLAYER SETTINGS */
.pset-row{display:grid;grid-template-columns:1fr 80px 36px;gap:6px;align-items:center;margin-bottom:8px;}

/* MISC */
.divider{height:1px;background:#eee;margin:12px 0;}
.tc{text-align:center;} .sm{font-size:13px;} .gc{color:#888;} .gr{color:var(--gm);}
.mt8{margin-top:8px;} .mt16{margin-top:16px;}
.setup-notice{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px;margin-bottom:14px;font-size:13px;color:#856404;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page.active{animation:fadeIn .2s ease;}
</style>
</head>
<body>

<div id="phdr" class="hdr" style="display:none">
  <div class="hdr-title" id="ptitle">４９ゴルフ会</div>
  <div class="hdr-nav">
    <button class="nav-btn" onclick="goBack()">◀ 戻る</button>
    <button class="nav-btn" onclick="nav('home')">🏠 HOME</button>
  </div>
</div>

<!-- HOME -->
<div id="p-home" class="page active">
  <div class="home-wrap">
    <div class="home-icon">⛳</div>
    <div class="home-title" id="home-title">４９ゴルフ会</div>
  </div>
  <div class="menu-grid">
    <button class="menu-btn" onclick="nav('past')"><span class="ico">🏆</span>過去の<br>ラウンド結果</button>
    <button class="menu-btn" onclick="nav('hcp')"><span class="ico">📊</span>現在の<br>ハンデ</button>
    <button class="menu-btn" onclick="nav('digest')"><span class="ico">📅</span>今シーズン<br>ダイジェスト</button>
    <button class="menu-btn" onclick="nav('input')"><span class="ico">✏️</span>ラウンド<br>結果入力</button>

</div>

<!-- PAST RESULTS -->
<div id="p-past" class="page"><div id="c-past"></div></div>

<!-- YEAR DETAIL -->
<div id="p-yrdet" class="page"><div id="c-yrdet"></div></div>

<!-- HANDICAP -->
<div id="p-hcp" class="page"><div id="c-hcp"></div></div>

<!-- SEASON DIGEST -->
<div id="p-digest" class="page"><div id="c-digest"></div></div>

<!-- ROUND INPUT -->
<div id="p-input" class="page"><div id="c-input"></div></div>

<!-- ADMIN MENU -->
<div id="p-admin" class="page">
  <div class="card">
    <div class="card-title">⚙️ 管理メニュー</div>
    <button class="btn btn-p mt8" onclick="nav('aset')">⚙️ 基本設定</button>
    <button class="btn btn-p" onclick="nav('aconf')">✅ ラウンド結果確定</button>
    <button class="btn btn-p" onclick="nav('aedit')">✏️ ラウンド結果修正</button>
  </div>
</div>

<!-- ADMIN SETTINGS -->
<div id="p-aset" class="page"><div id="c-aset"></div></div>

<!-- ADMIN CONFIRM -->
<div id="p-aconf" class="page"><div id="c-aconf"></div></div>

<!-- ADMIN EDIT -->
<div id="p-aedit" class="page"><div id="c-aedit"></div></div>

<!-- MODAL: Admin Login -->
<div id="m-login" class="mo">
  <div class="mbox">
    <div class="mtitle">🔐 管理者ログイン</div>
    <div class="fg"><label class="fl">パスワード</label>
      <input type="password" id="pw-input" class="fi" placeholder="パスワードを入力"
        onkeydown="if(event.key==='Enter')chkPw()">
    </div>
    <div id="pw-err" style="color:red;font-size:13px;margin-bottom:8px;display:none">パスワードが違います</div>
    <button class="btn btn-p" onclick="chkPw()">ログイン</button>
    <button class="btn btn-s" onclick="closeM('m-login')">キャンセル</button>
  </div>
</div>

<!-- MODAL: Confirm Dialog -->
<div id="m-conf" class="mo">
  <div class="mbox">
    <div class="mtitle" id="conf-title">確認</div>
    <p id="conf-msg" style="text-align:center;margin-bottom:16px;line-height:1.6;"></p>
    <button class="btn btn-p" id="conf-yes">はい（YES）</button>
    <button class="btn btn-s" onclick="closeM('m-conf')">いいえ（NO）</button>
  </div>
</div>

<div id="loading-overlay" style="position:fixed;inset:0;background:rgba(26,92,26,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:16px;">
  <div style="font-size:44px;">⛳</div>
  <div style="font-size:17px;font-weight:bold;letter-spacing:2px;">データを読み込み中...</div>
  <div style="width:48px;height:48px;border:5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;"></div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ─── FIREBASE ────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDr-WdMLs8Mr3wwhLHS18EveL6nKFuoZdY",
  authDomain: "golf-49917.firebaseapp.com",
  projectId: "golf-49917",
  storageBucket: "golf-49917.firebasestorage.app",
  messagingSenderId: "527464807812",
  appId: "1:527464807812:web:e8035e11d6deb538b8f1d1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC = db.collection('app').doc('data');

// ─── DATA ────────────────────────────────────────────────
function defData() {
  return {
    settings: { clubName: '４９ゴルフ会', roundsPerYear: 4, adminPw: '4949', players: [] },
    confirmed: [],
    pending: null,
    yearEnd: []
  };
}

let D = defData();
let _initialized = false;

function save() {
  return DOC.set(JSON.parse(JSON.stringify(D)));
}

// ─── NAV ─────────────────────────────────────────────────
let hist = ['home'];

const titles = {
  past:'過去のラウンド結果', yrdet:'年度別成績', hcp:'現在のハンデ',
  digest:'今シーズンダイジェスト', input:'ラウンド結果入力',
  admin:'管理メニュー', aset:'基本設定', aconf:'ラウンド結果確定', aedit:'ラウンド結果修正'
};

function nav(id, params={}) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById('p-'+id);
  if(!el) return;
  el.classList.add('active');

  const hdr = document.getElementById('phdr');
  const fab = document.querySelector('.admin-fab');
  if(id==='home') {
    hdr.style.display='none'; fab.style.display='flex';
    const t=document.getElementById('home-title');
    if(t) t.textContent=D.settings.clubName||'４９ゴルフ会';
  }
  else { hdr.style.display='block'; fab.style.display='none'; document.getElementById('ptitle').textContent=titles[id]||'４９ゴルフ会'; }

  if(id==='past') renderPast();
  else if(id==='yrdet') renderYrDet(params.year);
  else if(id==='hcp') renderHcp();
  else if(id==='digest') renderDigest();
  else if(id==='input') renderInput();
  else if(id==='aset') renderAset();
  else if(id==='aconf') renderAconf();
  else if(id==='aedit') renderAedit();

  if(hist[hist.length-1]!==id) hist.push(id);
  window.scrollTo(0,0);
}

function goBack() {
  hist.pop();
  nav(hist.length ? hist[hist.length-1] : 'home');
}

// ─── HELPERS ─────────────────────────────────────────────
const players = () => D.settings.players || [];
const pname = id => { const p=players().find(x=>x.id===id); return p?p.name:'?'; };
const rpy = () => D.settings.roundsPerYear || 4;

function confForYear(y) { return D.confirmed.filter(r=>r.year===y); }

function isYearDone(y) { return confForYear(y).length >= rpy(); }

function doneYears() {
  const yrs = [...new Set(D.confirmed.map(r=>r.year))];
  return yrs.filter(y=>isYearDone(y)).sort((a,b)=>a-b);
}

function curYear() {
  let s = 1;
  while(true) {
    if(!isYearDone(s)) return s;
    s++;
    if(s > 1000) return s;
  }
}

function curRound() { return confForYear(curYear()).length + 1; }

// Handicap for a player at start of given year (after prior year-end adjustments)
function hcpAt(pid, year) {
  const p = players().find(x=>x.id===pid);
  if(!p) return 0;
  let h = p.initHcp || 0;
  const done = doneYears().filter(y=>y<year);
  for(const y of done) {
    const rankSt = standings(y).filter(s=>!s.outOfRanking);
    const winnerId = rankSt[0]?.pid;
    const runnerUpId = rankSt[1]?.pid;
    if(winnerId===pid) h = Math.floor(h*0.8);
    else if(runnerUpId===pid) h = Math.floor(h*0.9);
  }
  return h;
}

function curHcp(pid) { return hcpAt(pid, curYear()); }

// Calculate standings for a year from confirmed rounds
function standings(year) {
  const rounds = confForYear(year);
  if(!rounds.length) return [];
  const s1 = year === 1; // SEASON1はグロス基準
  return players().map(p=>{
    let gross=0, net=0, allNet=true, hasGross=false, grossRounds=0;
    const rscores = [];
    for(const r of rounds) {
      const res = r.results.find(x=>x.pid===p.id);
      if(!res) { allNet=false; rscores.push({round:r.round,participated:false,gross:null,net:null}); continue; }
      rscores.push({round:r.round,participated:res.participated,gross:res.gross,net:res.net});
      if(res.gross!=null) { gross+=res.gross; hasGross=true; grossRounds++; }
      if(res.net!=null) net+=res.net; else allNet=false;
    }
    // SEASON1: グロスが揃っていないラウンドがあればランク外
    const outOfRanking = s1 && grossRounds < rounds.length;
    return { pid:p.id, name:p.name, rscores, totalGross:hasGross?gross:null, totalNet:allNet?net:null, outOfRanking };
  }).sort((a,b)=>{
    if(a.outOfRanking && !b.outOfRanking) return 1;
    if(!a.outOfRanking && b.outOfRanking) return -1;
    const va = s1 ? a.totalGross : a.totalNet;
    const vb = s1 ? b.totalGross : b.totalNet;
    if(va==null&&vb==null) return 0;
    if(va==null) return 1;
    if(vb==null) return -1;
    return va-vb;
  });
}

function roundInfo(year, roundNum) {
  const r = D.confirmed.find(x=>x.year===year && x.round===roundNum);
  if(!r) return '';
  const parts = [];
  if(r.date) parts.push(r.date.replace(/-/g,'/'));
  if(r.courseName) parts.push(r.courseName);
  return parts.join('　');
}

// ─── PAST RESULTS ────────────────────────────────────────
function renderPast() {
  const el = document.getElementById('c-past');
  const past = doneYears().filter(y=>y<curYear()).sort((a,b)=>a-b);
  if(!past.length) {
    el.innerHTML=`<div class="card"><div class="card-title">🏆 過去のラウンド結果</div><p class="tc gc">まだ過去のデータがありません</p></div>`;
    return;
  }
  drawPast(past);
}

function champScoreCells(s, yr, n) {
  const s1 = yr === 1;
  if(!s) return Array(n).fill('<td>-</td>').join('');
  let cells='';
  for(let i=1;i<=n;i++){
    const sc=s.rscores.find(r=>r.round===i);
    if(!sc) cells+='<td>-</td>';
    else if(!sc.participated) cells+=`<td style="color:#bbb">欠</td>`;
    else cells+=`<td>${s1?(sc.gross??'-'):(sc.net??'-')}</td>`;
  }
  return cells;
}

function drawPast(past) {
  const el = document.getElementById('c-past');
  const n = rpy();

  // ── 歴代チャンピオン一覧（シンプル、日付・ゴルフ場なし）
  let champRows='';
  for(const yr of past){
    const rankSt=standings(yr).filter(s=>!s.outOfRanking);
    const wn=rankSt[0]?.name??'?', rn=rankSt[1]?.name??'?';
    champRows+=`<tr>
      <td style="text-align:left;font-weight:bold">SEASON${yr}</td>
      <td><span class="badge bg" style="min-width:3.5em;display:inline-block;text-align:center">優勝</span> <strong>${wn}</strong></td>
      <td style="text-align:left"><span class="badge bs" style="min-width:3.5em;display:inline-block;text-align:center">準優勝</span> ${rn}</td>
    </tr>`;
  }

  // ── 詳細カード（日付・ゴルフ場・スコア、全シーズン）
  let detailCards='';
  for(const yr of past){
    const s1=yr===1;
    const st=standings(yr);
    const rankSt=st.filter(s=>!s.outOfRanking);
    const wst=rankSt[0], rst=rankSt[1];
    const wn=wst?.name??'?', rn=rst?.name??'?';
    const rhdrs=Array.from({length:n},(_,i)=>`<th>第${i+1}R<br>${s1?'グロス':'ネット'}</th>`).join('');
    const wTotal=s1?(wst?.totalGross??'-'):(wst?.totalNet??'-');
    const rTotal=s1?(rst?.totalGross??'-'):(rst?.totalNet??'-');
    const totalLabel=s1?'合計グロス':'合計ネット';
    let rInfoRows='';
    for(let i=1;i<=n;i++){
      const info=roundInfo(yr,i);
      if(info) rInfoRows+=`<div style="font-size:11px;color:#888;margin-bottom:2px">第${i}R：${info}</div>`;
    }
    detailCards+=`
      <div class="champ-card">
        <div class="champ-yr">🏆 SEASON${yr}</div>
        ${rInfoRows?`<div style="margin:4px 0 8px">${rInfoRows}</div>`:''}
        <div class="scroll-x">
          <table class="tbl">
            <tr><th>順位</th><th>名前</th>${rhdrs}<th>${totalLabel}</th></tr>
            <tr class="r1">
              <td><span class="badge bg">優勝</span></td><td><strong>${wn}</strong></td>
              ${champScoreCells(wst,yr,n)}<td><strong>${wTotal}</strong></td>
            </tr>
            <tr class="r2">
              <td><span class="badge bs">準優勝</span></td><td>${rn}</td>
              ${champScoreCells(rst,yr,n)}<td>${rTotal}</td>
            </tr>
          </table>
        </div>
      </div>`;
  }

  // ── 年度別詳細ボタン（昇順）
  let yrBtns='';
  for(const yr of past) yrBtns+=`<button class="yr-btn" onclick="nav('yrdet',{year:${yr}})">SEASON${yr}</button>`;

  el.innerHTML=`
    <div class="sec-title">🏆 歴代チャンピオン</div>
    <div class="card"><div class="scroll-x"><table class="tbl">
      <tr><th>SEASON</th><th>優勝</th><th>準優勝</th></tr>
      ${champRows}
    </table></div></div>
    <button class="btn" id="past-det-btn" onclick="togglePastDetail()" style="margin-bottom:16px;background:linear-gradient(135deg,var(--gm),var(--gd));color:#fff;border:none">📋 詳細を見る</button>
    <div id="past-detail" style="display:none">${detailCards}</div>
    <div class="sec-title">📋 年度別詳細</div>
    <div class="yr-grp">${yrBtns}</div>`;
}

function togglePastDetail() {
  const d=document.getElementById('past-detail');
  const btn=document.getElementById('past-det-btn');

function renderYrDet(year) {
  const el = document.getElementById('c-yrdet');
  document.getElementById('ptitle').textContent=`SEASON${year} 成績`;
  const st = standings(year);
  const n = rpy();
  const s1 = year === 1;
  if(!st.length){el.innerHTML='<p class="tc gc">データなし</p>';return;}
  const ranked = st.filter(s=>!s.outOfRanking);
  const top = s1 ? ranked[0]?.totalGross : ranked[0]?.totalNet;
  let rhdrs='';
  for(let i=1;i<=n;i++) rhdrs+=`<th>第${i}R<br>グロス</th>`;
  let rows=''; let ri=0;
  st.forEach((s)=>{
    const oor = s.outOfRanking;
    let rank;
    if(oor) rank='<span class="badge" style="background:#bbb;color:#fff">ランク外</span>';
    else rank = ri===0?'<span class="badge bg">優勝</span>':ri===1?'<span class="badge bs">準優勝</span>':`${ri+1}位`;
    let cells='';
    for(let r=1;r<=n;r++){
      const sc=s.rscores.find(x=>x.round===r);
      if(!sc) cells+='<td>-</td>';
      else if(!sc.participated) cells+=`<td style="color:#bbb">欠</td>`;
      else cells+=`<td>${sc.gross??'-'}</td>`;
    }
    const rankVal = s1 ? s.totalGross : s.totalNet;
    const diff = !oor&&ri>0&&rankVal!=null&&top!=null?`<br><span style="color:#888;font-size:11px">+${rankVal-top}</span>`:'';
    const cls=oor?'':ri===0?'r1':ri===1?'r2':'';
    const totalCol = s1
      ? `<td><strong>${s.totalGross??'-'}</strong>${diff}</td>`
      : `<td>${s.totalGross??'-'}</td><td><strong>${s.totalNet??'-'}</strong>${diff}</td>`;
    rows+=`<tr class="${cls}"><td>${rank}</td><td style="text-align:left">${s.name}</td>${cells}${totalCol}</tr>`;
    if(!oor) ri++;
  });
  let yrDetInfo='';
  for(let i=1;i<=n;i++){
    const info=roundInfo(year,i);
    if(info) yrDetInfo+=`<div style="font-size:12px;color:#666;margin-bottom:3px">第${i}R：${info}</div>`;
  }

  el.innerHTML=`<div class="card"><div class="card-title">📋 SEASON${year} 全参加者成績</div>
    ${yrDetInfo?`<div style="margin-bottom:10px">${yrDetInfo}</div>`:''}
    <div class="scroll-x"><table class="tbl">
      <tr><th>順位</th><th>名前</th>${rhdrs}${s1?'':'<th>合計<br>グロス</th>'}<th>合計<br>${s1?'グロス':'ネット'}</th></tr>
      ${rows}
    </table></div></div>`;
}

// ─── HANDICAP ────────────────────────────────────────────
function renderHcp() {
  const el = document.getElementById('c-hcp');

  if(!ps.length){el.innerHTML='<div class="card"><p class="tc gc">プレイヤー未登録</p></div>';return;}
  let yrHdrs='';
  for(const y of done) yrHdrs+=`<th>S${y}<br>終了後</th>`;
  const psSorted = [...ps].sort((a,b)=>curHcp(a.id)-curHcp(b.id));
  let rows='';
  for(const p of psSorted){
    const init=p.initHcp||0, cur=curHcp(p.id), diff=cur-init;
    const ds=diff===0?'±0':diff<0?`${diff}`:`+${diff}`;
    const dc=diff<0?'color:var(--gm)':diff>0?'color:var(--danger)':'';
    let yCells='';
    for(const y of done) yCells+=`<td>${hcpAt(p.id,y+1)}</td>`;
    rows+=`<tr><td style="text-align:left">${p.name}</td><td>${init}</td>${yCells}<td><strong>${cur}</strong></td><td style="${dc}">${ds}</td></tr>`;
  }
  el.innerHTML=`<div class="card"><div class="card-title">📊 ハンデ一覧</div>
    <div class="scroll-x"><table class="tbl">
      <tr><th>名前</th><th>初期</th>${yrHdrs}<th>現在</th><th>推移</th></tr>${rows}
    </table></div></div>
    <div class="card"><p class="sm gc">優勝：×80%　準優勝：×90%（小数切り捨て）</p></div>`;
}

          <option value="" ${parVal===''?'selected':''}>-- 選択 --</option>

          <label>OUT</label>

          <div class="dis-f" id="ind-${p.id}">-</div>
        </div>

          <label>グロス</label>
          <div class="auto-f" id="gr-${p.id}">-</div>

        ${s1?'':`<div>
          <label>ハンデ</label>
          <div class="auto-f" id="hc-${p.id}">${curHcp(p.id)}</div>
        </div>
        <div>
          <label>ネット</label>
          <div class="auto-f" id="nt-${p.id}">-</div>
        </div>`}
        ${s1?`<div>
          <label>ハンデ</label>
          <div class="auto-f" id="hc-${p.id}" style="color:#ccc">${curHcp(p.id)}</div>
        </div>`:''}
      </div>
    </div>`;
  }

  const pendingDate = (D.pending?.year===yr && D.pending?.round===rnd) ? (D.pending.date||'') : '';
  const pendingCourse = (D.pending?.year===yr && D.pending?.round===rnd) ? (D.pending.courseName||'') : '';

        <div><span class="sm gc">ラウンド</span><div style="font-size:18px;font-weight:bold;color:var(--gd)">第${rnd}ラウンド</div></div>
      </div>
      <div class="fg">
        <label class="fl">📅 日付</label>
        <input type="date" id="round-date" class="fi" value="${pendingDate}">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label class="fl">⛳ ゴルフ場名</label>
        <input type="text" id="round-course" class="fi" placeholder="例：○○カントリークラブ" value="${pendingCourse}">
      </div>
    </div>

      <button class="btn btn-p" onclick="saveInput()">💾 入力内容を保存</button>
      <p class="sm gc tc" style="margin-top:4px">確定は管理画面から行います</p>
    </div>`;

  // restore display state
  for(const p of ps) {
    const d=inputState[p.id];
    if(d.participated!==null) applyPar(p.id, d.participated);
    if(d.participated===true) calcScore(p.id);
    if(d.participated===false) updateAbsent();
  }
}

function onPar(pid, val) {
  if(val==='') return;
  const participated = val==='true';
  inputState[pid].participated = participated;
  inputState[pid].hcp = curHcp(pid);
  applyPar(pid, participated);
  if(participated) calcScore(pid);
  else { clearAbsent(pid); updateAbsent(); }
}

function applyPar(pid, participated) {
  const outI=document.getElementById(`out-${pid}`), inI=document.getElementById(`in-${pid}`);
  const outD=document.getElementById(`outd-${pid}`), inD=document.getElementById(`ind-${pid}`);
  const gr=document.getElementById(`gr-${pid}`), hc=document.getElementById(`hc-${pid}`);
  if(!outI) return;
  if(participated) {
    outI.style.display='block'; inI.style.display='block';
    outD.style.display='none'; inD.style.display='none';
    if(gr){gr.style.color='';} if(hc){hc.style.color='';}
  } else {
    outI.style.display='none'; inI.style.display='none';
    outD.style.display='block'; inD.style.display='block';
    if(gr){gr.style.color='#ccc';gr.textContent='-';}
    if(hc){hc.style.color='#ccc';}
  }
}

function onScore(pid) {
  const o=parseInt(document.getElementById(`out-${pid}`).value)||0;
  const i=parseInt(document.getElementById(`in-${pid}`).value)||0;
  inputState[pid].out=o||''; inputState[pid].in=i||'';
  calcScore(pid);
  updateAbsent();
}

function calcScore(pid) {
  const d=inputState[pid];
  if(d.participated!==true) return;
  const o=parseInt(d.out)||0, i=parseInt(d.in)||0;
  const gr=o>0&&i>0?o+i:null;
  const nt=gr!=null?gr-d.hcp:null;
  d.gross=gr; d.net=nt;
  const ge=document.getElementById(`gr-${pid}`), ne=document.getElementById(`nt-${pid}`);
  if(ge) ge.textContent=gr!=null?gr:'-';
  if(ne) ne.textContent=nt!=null?nt:'-';
}

function clearAbsent(pid) {
  inputState[pid].gross=null; inputState[pid].out=''; inputState[pid].in='';
}

function updateAbsent() {
  const ps=players();
  // Collect nets of participants who have valid net
  const nets=ps.filter(p=>inputState[p.id]?.participated===true&&inputState[p.id]?.net!=null)
               .map(p=>inputState[p.id].net);
  // All participants answered?
  const allSet=ps.every(p=>{const d=inputState[p.id];return d&&d.participated!==null;});
  const allParHaveNet=ps.filter(p=>inputState[p.id]?.participated===true)
                        .every(p=>inputState[p.id].net!=null);
  const ready=allSet&&allParHaveNet&&nets.length>0;
  const maxNet=ready?Math.max(...nets):null;

  for(const p of ps) {
    const d=inputState[p.id];
    if(d&&d.participated===false) {
      const ne=document.getElementById(`nt-${p.id}`);
      if(!ready||maxNet==null) {
        if(ne){ ne.className='net-wait'; ne.innerHTML='他プレイヤー<br>登録待ち'; }
        d.net=null;
      } else {
        if(ne){ ne.className='auto-f'; ne.textContent=maxNet; }
        d.net=maxNet;
      }
    }
  }
}

function saveInput() {
  const ps=players();
  D.pending={
    year:curYear(), round:curRound(),
    date:document.getElementById('round-date')?.value||'',
    courseName:document.getElementById('round-course')?.value||'',
    results:ps.map(p=>({...inputState[p.id]}))
  };
  save();
  alert('入力内容を保存しました。\n確定は管理画面から行ってください。');
  nav('home');
}

function confirmRound() {
  showConfirm('ラウンド結果を確定しますか？\nこの操作は取り消せません。', execConfirm);
}

function execConfirm() {
  const pnd=D.pending;
  if(!pnd) return;
  const yr=pnd.year, rnd=pnd.round, n=rpy();

  D.confirmed.push({...pnd,confirmed:true});
  D.pending=null;

  const confForYr=D.confirmed.filter(r=>r.year===yr);
  const done=confForYr.length>=n;

  if(done) {
    // Calculate winner/runner-up from standings
    const st=standings(yr);
    if(st.length>=2) {
      const wid=st[0].pid, rid=st[1].pid;
      D.yearEnd=D.yearEnd||[];
      D.yearEnd.push({year:yr,winnerId:wid,runnerUpId:rid});
      save();
      alert(`✅ 第${rnd}ラウンドを確定しました。\n\n🏆 SEASON${yr} 終了！\n優勝：${pname(wid)}\n準優勝：${pname(rid)}\n\nSEASON${yr+1}に移行します。`);
    } else {
      save();
      alert(`✅ 第${rnd}ラウンドを確定しました。\nSEASON${yr} 終了！`);
    }
  } else {
    save();
    alert(`✅ 第${rnd}ラウンドを確定しました。\n次は第${rnd+1}ラウンドです。`);
  }
  nav('admin');
}

// ─── ROUND EDIT ──────────────────────────────────────────
let editState = { year: null, round: null };
let editInputState = {};

function renderAedit() {
  const el = document.getElementById('c-aedit');
  const conf = D.confirmed;
  if(!conf.length){
    el.innerHTML=`<div class="card"><div class="card-title">✏️ ラウンド結果修正</div><p class="tc gc">確定済みのラウンドがありません</p></div>`;
    return;
  }
  const seasons=[...new Set(conf.map(r=>r.year))].sort((a,b)=>a-b);
  const selSeason = editState.year && seasons.includes(editState.year) ? editState.year : seasons[0];
  const seasonOpts=seasons.map(s=>`<option value="${s}" ${s===selSeason?'selected':''}>SEASON${s}</option>`).join('');
  const roundsForSeason=conf.filter(r=>r.year===selSeason).sort((a,b)=>a.round-b.round);
  const selRound = editState.round && roundsForSeason.find(r=>r.round===editState.round) ? editState.round : roundsForSeason[0]?.round;
  const roundOpts=roundsForSeason.map(r=>`<option value="${r.round}" ${r.round===selRound?'selected':''}>第${r.round}ラウンド</option>`).join('');

  el.innerHTML=`
    <div class="card">
      <div class="card-title">✏️ ラウンド結果修正</div>
      <div class="fg"><label class="fl">シーズン</label>
        <select class="fs" id="edit-season" onchange="onEditSeasonChange(this.value)">${seasonOpts}</select>
      </div>
      <div class="fg" style="margin-bottom:0"><label class="fl">ラウンド</label>
        <select class="fs" id="edit-round">${roundOpts}</select>
      </div>
    </div>
    <button class="btn btn-p" style="margin-bottom:16px" onclick="loadEditForm()">📋 編集フォームを表示</button>
    <div id="edit-form-area"></div>`;

  editState.year=selSeason; editState.round=selRound;
  if(selSeason && selRound) loadEditForm();
}

function onEditSeasonChange(season) {
  editState.year=parseInt(season); editState.round=null;
  const rounds=D.confirmed.filter(r=>r.year===editState.year).sort((a,b)=>a.round-b.round);
  const rs=document.getElementById('edit-round');
  rs.innerHTML=rounds.map(r=>`<option value="${r.round}">第${r.round}ラウンド</option>`).join('');
  document.getElementById('edit-form-area').innerHTML='';
}

function loadEditForm() {
  const yr=parseInt(document.getElementById('edit-season').value);
  const rnd=parseInt(document.getElementById('edit-round').value);
  editState.year=yr; editState.round=rnd;
  const rd=D.confirmed.find(r=>r.year===yr&&r.round===rnd);
  if(!rd) return;
  const ps=players();
  editInputState={};
  for(const p of ps){
    const res=rd.results.find(x=>x.pid===p.id);
    editInputState[p.id]=res?{...res}:{pid:p.id,participated:false,out:'',in:'',gross:null,hcp:hcpAt(p.id,yr),net:null};
  }
  let rows='';
  for(const p of ps){
    const d=editInputState[p.id];
    const par=d.participated===true;
    rows+=`
    <div class="prow" id="epr-${p.id}">
      <div class="prow-hdr">
        <span class="pname">👤 ${p.name}</span>
        <select class="fs" style="width:100px" onchange="onEditPar(${p.id},this.value)">
          <option value="true" ${par?'selected':''}>参加</option>
          <option value="false" ${!par?'selected':''}>欠席</option>
        </select>
      </div>
      <div class="sinputs">
        <div><label>OUT</label>
          <input type="number" id="eout-${p.id}" value="${d.out||''}" min="1" max="200" onchange="onEditScore(${p.id})" ${!par?'style="display:none"':''}>
          <div class="dis-f" id="eoutd-${p.id}" ${par?'style="display:none"':''}>-</div>
        </div>
        <div><label>IN</label>
          <input type="number" id="ein-${p.id}" value="${d.in||''}" min="1" max="200" onchange="onEditScore(${p.id})" ${!par?'style="display:none"':''}>
          <div class="dis-f" id="eind-${p.id}" ${par?'style="display:none"':''}>-</div>
        </div>
        <div><label>グロス</label><div class="auto-f" id="egr-${p.id}" ${!par?'style="color:#ccc"':''}>${par?(d.gross??'-'):'-'}</div></div>
        <div><label>ハンデ</label><div class="auto-f" id="ehc-${p.id}" ${!par?'style="color:#ccc"':''}>${d.hcp}</div></div>
        <div><label>ネット</label><div class="auto-f" id="ent-${p.id}">${d.net??'-'}</div></div>
      </div>
    </div>`;
  }
  document.getElementById('edit-form-area').innerHTML=`
    <div class="card">
      <div class="card-title">SEASON${yr}　第${rnd}ラウンド</div>
      <div class="fg"><label class="fl">📅 日付</label>
        <input type="date" id="edit-date" class="fi" value="${rd.date||''}"></div>
      <div class="fg" style="margin-bottom:0"><label class="fl">⛳ ゴルフ場名</label>
        <input type="text" id="edit-course" class="fi" placeholder="例：○○カントリークラブ" value="${rd.courseName||''}"></div>
    </div>
    ${rows}
    <div class="card">
      <button class="btn btn-p" onclick="saveAedit()">💾 修正内容を保存する</button>
    </div>`;
  updateEditAbsent();
}

function onEditPar(pid, val) {
  const par=val==='true';
  editInputState[pid].participated=par;
  const outI=document.getElementById(`eout-${pid}`), inI=document.getElementById(`ein-${pid}`);
  const outD=document.getElementById(`eoutd-${pid}`), inD=document.getElementById(`eind-${pid}`);
  const gr=document.getElementById(`egr-${pid}`), hc=document.getElementById(`ehc-${pid}`);
  if(par){
    outI.style.display='block'; inI.style.display='block';
    outD.style.display='none'; inD.style.display='none';
    if(gr)gr.style.color=''; if(hc)hc.style.color='';
  } else {
    outI.style.display='none'; inI.style.display='none';
    outD.style.display='block'; inD.style.display='block';
    if(gr){gr.style.color='#ccc';gr.textContent='-';}
    if(hc)hc.style.color='#ccc';
    editInputState[pid].out=''; editInputState[pid].in=''; editInputState[pid].gross=null; editInputState[pid].net=null;
  }
  if(par) calcEditScore(pid);
  updateEditAbsent();
}

function onEditScore(pid) {
  editInputState[pid].out=parseInt(document.getElementById(`eout-${pid}`).value)||'';
  editInputState[pid].in=parseInt(document.getElementById(`ein-${pid}`).value)||'';
  calcEditScore(pid);
  updateEditAbsent();
}

function calcEditScore(pid) {
  const d=editInputState[pid];
  if(d.participated!==true) return;
  const o=parseInt(d.out)||0, i=parseInt(d.in)||0;
  const gr=o>0&&i>0?o+i:null, nt=gr!=null?gr-d.hcp:null;
  d.gross=gr; d.net=nt;
  const ge=document.getElementById(`egr-${pid}`), ne=document.getElementById(`ent-${pid}`);
  if(ge)ge.textContent=gr!=null?gr:'-';
  if(ne)ne.textContent=nt!=null?nt:'-';
}

function updateEditAbsent() {
  const ps=players();
  const nets=ps.filter(p=>editInputState[p.id]?.participated===true&&editInputState[p.id]?.net!=null).map(p=>editInputState[p.id].net);
  const maxNet=nets.length>0?Math.max(...nets):null;
  for(const p of ps){
    const d=editInputState[p.id];
    if(d&&d.participated===false){
      const ne=document.getElementById(`ent-${p.id}`);
      if(ne)ne.textContent=maxNet!=null?maxNet:'-';
      d.net=maxNet;
    }
  }
}

function saveAedit() {
  const yr=editState.year, rnd=editState.round;
  const idx=D.confirmed.findIndex(r=>r.year===yr&&r.round===rnd);
  if(idx<0) return;
  showConfirm('修正内容を保存しますか？', ()=>{
    D.confirmed[idx]={
      ...D.confirmed[idx],
      date:document.getElementById('edit-date')?.value||'',
      courseName:document.getElementById('edit-course')?.value||'',
      results:players().map(p=>({...editInputState[p.id]}))
    };
    save();
    alert('修正内容を保存しました');
  });
}

// ─── ADMIN AUTH ───────────────────────────────────────────
function showAdminLogin() {
  document.getElementById('pw-input').value='';
  document.getElementById('pw-err').style.display='none';
  openM('m-login');
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
}

function chkPw() {
  const v=document.getElementById('pw-input').value;
  if(v===(D.settings.adminPw||'4949')) { closeM('m-login'); nav('admin'); }
  else document.getElementById('pw-err').style.display='block';
}

// ─── MODALS ──────────────────────────────────────────────
function openM(id){document.getElementById(id).classList.add('active');}
function closeM(id){document.getElementById(id).classList.remove('active');}
function showConfirm(msg,cb){
  document.getElementById('conf-title').textContent='確認';
  document.getElementById('conf-msg').textContent=msg;
  document.getElementById('conf-yes').onclick=()=>{closeM('m-conf');cb();};
  openM('m-conf');
}

// ─── INIT ─────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.mo').forEach(m=>{
    m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('active');});
  });

  const inputPages = new Set(['input','aset','aedit']);

  DOC.onSnapshot(snap=>{
    const data = snap.exists ? snap.data() : null;
    D = data ? data : defData();

    if(!_initialized) {
      _initialized = true;
      document.getElementById('loading-overlay').style.display='none';
      nav('home');
    } else {
      // re-render current page when remote data changes (skip input forms)
      const cur = hist[hist.length-1];
      if(!inputPages.has(cur)) nav(cur);
    }
  }, err=>{
    console.error('Firestore error', err);
    document.getElementById('loading-overlay').innerHTML=
      '<div style="text-align:center;padding:24px"><div style="font-size:32px">⚠️</div><div style="margin-top:12px">データの読み込みに失敗しました</div><div style="font-size:13px;margin-top:8px;opacity:.8">'+err.message+'</div></div>';
  });
});
</script>
